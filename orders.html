<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История заказов - Food Construct</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="lunch.css">
</head>
<body>
    <header>
        <h1>Food Construct</h1>
        <nav>
            <a href="about.html">О нас</a>
            <a href="lunch.html">Собрать ланч</a>
            <a href="order.html">Оформить заказ</a>
            <a href="orders.html" id="active">Заказы</a>
            <a href="#contacts">Контакты</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>История заказов</h2>
            <div class="table-container">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th>№</th>
                            <th>Дата оформления</th>
                            <th>Состав заказа</th>
                            <th>Стоимость</th>
                            <th>Время доставки</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-window">
            <div class="modal-header">
                <h3 id="modal-title">Заголовок</h3>
                <span class="modal-close">&times;</span>
            </div>
            <div id="modal-body" class="modal-body">
            </div>
            <div id="modal-footer" class="modal-footer">
            </div>
        </div>
    </div>

    <div id="notification-container"></div>

    <footer><p>Позвонить нам +7-000-000-00-00</p></footer>

    <script src="orders.js"></script>
</body>
</html>
